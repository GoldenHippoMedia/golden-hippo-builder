name: Sync Wiki

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'wiki/**'

permissions:
  contents: write

jobs:
  sync:
    name: Publish Wiki
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync wiki folder to GitHub Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Clone the wiki repo, or initialize a fresh one if it doesn't exist yet
          if ! git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki-repo 2>/dev/null; then
            echo "Wiki repo not found — initializing a new one"
            mkdir wiki-repo
            cd wiki-repo
            git init
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git"
            cd ..
          fi

          # Remove existing files in the wiki repo (except .git)
          find wiki-repo -maxdepth 1 -not -name '.git' -not -name 'wiki-repo' -not -path wiki-repo | xargs rm -rf

          # Copy wiki/ contents to the wiki repo root
          cp wiki/* wiki-repo/

          # GitHub Wiki uses Home.md instead of README.md
          if [ -f wiki-repo/README.md ]; then
            mv wiki-repo/README.md wiki-repo/Home.md
          fi

          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet && git diff --staged --quiet; then
            echo "No wiki changes to commit."
          else
            git add -A
            git commit -m "docs: sync wiki from ${GITHUB_SHA::7}"
            git push
          fi
