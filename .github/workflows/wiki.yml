name: Sync Wiki

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'wiki/**'

jobs:
  sync:
    name: Publish Wiki
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Sync wiki folder to GitHub Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/GoldenHippoMedia/golden-hippo-builder.wiki.git"

          # Clone the wiki repo, or initialize a fresh one if it doesn't exist yet
          if ! git clone "$WIKI_URL" wiki-repo 2>/dev/null; then
            echo "Wiki repo not found — initializing a new one"
            mkdir wiki-repo && cd wiki-repo && git init && git remote add origin "$WIKI_URL" && cd ..
          fi

          # Clear existing wiki content (preserve .git)
          find wiki-repo -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +

          # Copy wiki/ contents into the wiki repo
          cp -r wiki/* wiki-repo/

          # GitHub Wiki uses Home.md instead of README.md
          if [ -f wiki-repo/README.md ]; then
            mv wiki-repo/README.md wiki-repo/Home.md
          fi

          # Push if there are changes
          cd wiki-repo
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to publish"
          else
            git commit -m "Sync wiki from main (${GITHUB_SHA::7})"
            git push
          fi
