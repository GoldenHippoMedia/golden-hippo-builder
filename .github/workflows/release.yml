name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install latest npm (required for trusted publishing)
        run: npm install -g npm@latest

      - run: npm install

      - run: npm run build

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Notify Slack of release
        if: steps.changesets.outputs.published == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          # Build package list
          PACKAGES=$(echo "$PUBLISHED_PACKAGES" | jq -r '.[] | "• \(.name)@\(.version)"' | head -20)
          COUNT=$(echo "$PUBLISHED_PACKAGES" | jq length)
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"

          # Send Slack message
          curl -sf "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg packages "$PACKAGES" \
              --arg count "$COUNT" \
              --arg url "$COMMIT_URL" \
              --arg repo "${{ github.repository }}" \
              '{
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: ("📦 " + $repo + " — " + $count + " package(s) released"), emoji: true }
                  },
                  {
                    type: "section",
                    text: { type: "mrkdwn", text: $packages }
                  },
                  {
                    type: "context",
                    elements: [{ type: "mrkdwn", text: ("<" + $url + "|View commit>") }]
                  }
                ]
              }'
            )"
