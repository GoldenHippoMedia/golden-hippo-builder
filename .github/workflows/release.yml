name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install latest npm (required for trusted publishing)
        run: npm install -g npm@latest

      - run: npm install

      - run: npm run build

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Notify Slack of release
        if: steps.changesets.outputs.published == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"

          # Extract release notes from each published package's CHANGELOG.md
          NOTES=""
          for row in $(echo "$PUBLISHED_PACKAGES" | jq -r '.[] | @base64'); do
            NAME=$(echo "$row" | base64 -d | jq -r '.name')
            VERSION=$(echo "$row" | base64 -d | jq -r '.version')

            # Find the package directory from its name
            PKG_DIR=$(find packages -name "package.json" -maxdepth 2 | xargs grep -l "\"name\": \"$NAME\"" | head -1 | xargs dirname)
            CHANGELOG="$PKG_DIR/CHANGELOG.md"

            if [ -f "$CHANGELOG" ]; then
              # Extract the section for this version (between ## X.Y.Z and next ## or EOF)
              SECTION=$(sed -n "/^## ${VERSION}$/,/^## /{ /^## ${VERSION}$/d; /^## /d; p; }" "$CHANGELOG" | sed '/^$/N;/^\n$/d')
              if [ -n "$SECTION" ]; then
                NOTES="${NOTES}*${NAME}@${VERSION}*\n${SECTION}\n\n"
              else
                NOTES="${NOTES}*${NAME}@${VERSION}*\n\n"
              fi
            else
              NOTES="${NOTES}*${NAME}@${VERSION}*\n\n"
            fi
          done

          # Send Slack message
          curl -sf "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg notes "$NOTES" \
              --arg url "$COMMIT_URL" \
              --arg repo "${{ github.repository }}" \
              '{
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: ("📦 " + $repo + " — New Release"), emoji: true }
                  },
                  {
                    type: "section",
                    text: { type: "mrkdwn", text: $notes }
                  },
                  {
                    type: "context",
                    elements: [{ type: "mrkdwn", text: ("<" + $url + "|View commit>") }]
                  }
                ]
              }'
            )"
