name: Slack Release Notification

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to notify about (e.g. @goldenhippo/builder-cart-schemas@0.5.0)'
        required: true

jobs:
  notify:
    name: Send Slack Notification
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name || inputs.release_tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Always fetch via API to avoid shell interpolation issues with the body
          gh release view "$TAG" --repo "${{ github.repository }}" --json body -q '.body' > /tmp/body.md

      - name: Send to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG}"

          NOTES_FILE=$(mktemp)

          # Convert GitHub markdown release body → Slack mrkdwn
          cat /tmp/body.md \
            | sed '/^### Patch Changes/,$d' \
            | sed 's/^### \(.*\)/*\1*/' \
            | sed 's/\*\*\([^*]*\)\*\*/*\1*/g' \
            | sed 's/\\\[/[/g; s/\\\]/]/g' \
            | sed -E 's/\[#([0-9]+)\]\(([^)]+)\)/<\2|#\1>/g' \
            | sed -E 's/\[`([^`]+)`\]\(([^)]+)\)/<\2|\1>/g' \
            | sed -E 's/\[@([^]]+)\]\(([^)]+)\)/<\2|@\1>/g' \
            | sed -E 's/^( *)-   /\1- /g' \
            | sed -E 's/Thanks <[^>]+>! - //' \
            | sed '/^[[:space:]]*$/N;/^\n*$/d' \
            > "$NOTES_FILE"

          # Prepend bold tag header
          HEADER_FILE=$(mktemp)
          printf '*%s*\n' "$TAG" > "$HEADER_FILE"
          cat "$NOTES_FILE" >> "$HEADER_FILE"
          mv "$HEADER_FILE" "$NOTES_FILE"

          curl -sf "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --rawfile notes "$NOTES_FILE" \
              --arg url "$RELEASE_URL" \
              --arg repo "${{ github.repository }}" \
              '{
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: ("\ud83d\udce6 " + $repo + " — New Release"), emoji: true }
                  },
                  {
                    type: "section",
                    text: { type: "mrkdwn", text: $notes }
                  },
                  {
                    type: "context",
                    elements: [{ type: "mrkdwn", text: ("<" + $url + "|View release>") }]
                  }
                ]
              }'
            )"
          rm -f "$NOTES_FILE"
