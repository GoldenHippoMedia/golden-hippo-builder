name: Slack Release Notification

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to notify about (e.g. @goldenhippo/builder-cart-schemas@0.5.0)'
        required: true

jobs:
  notify:
    name: Send Slack Notification
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name || inputs.release_tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if [ -n "${{ github.event.release.body }}" ]; then
            echo "${{ github.event.release.body }}" > /tmp/body.md
          else
            gh release view "$TAG" --repo "${{ github.repository }}" --json body -q '.body' > /tmp/body.md
          fi

      - name: Send to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG}"

          # Convert markdown release body to Slack mrkdwn
          BODY=$(cat /tmp/body.md \
            | sed 's/### \(.*\)/*\1*/g' \
            | sed 's/\[#\([0-9]*\)\](\([^)]*\))/<\2|#\1>/g' \
            | sed 's/\[\(`[^`]*`\)\](\([^)]*\))/<\2|\1>/g' \
            | sed 's/\[@\([^]]*\)\](\([^)]*\))/<\2|@\1>/g' \
            | head -40)

          # Build notes: bold tag header + body
          NOTES_FILE=$(mktemp)
          printf '*%s*\n%s' "$TAG" "$BODY" > "$NOTES_FILE"

          curl -sf "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --rawfile notes "$NOTES_FILE" \
              --arg url "$RELEASE_URL" \
              --arg repo "${{ github.repository }}" \
              '{
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: ("\ud83d\udce6 " + $repo + " — New Release"), emoji: true }
                  },
                  {
                    type: "section",
                    text: { type: "mrkdwn", text: $notes }
                  },
                  {
                    type: "context",
                    elements: [{ type: "mrkdwn", text: ("<" + $url + "|View release>") }]
                  }
                ]
              }'
            )"
          rm -f "$NOTES_FILE"
